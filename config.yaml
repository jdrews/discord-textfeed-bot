# Discord Text Feed Bot Configuration
# This file configures how the bot reads from a text file and injects lines into Discord

discord:
  # Target Discord channel ID (required)
  # Replace with your actual channel ID
  channel_id: "123456789012345678"

source:
  file_path: "./books/test_book.txt"
  start_line: 1  # Default to line 1, user specifies where to start
  end_line: null  # Optional - stop at this line number
  injection_mode: "line"  # Options: "line", "paragraph", "character_scene"

schedule:
  # Base seconds between injections (e.g., 180 = 3 minutes)
  interval_seconds: 180
  
  # Optional: ± variance in scheduling (0 = exact timing)
  # This adds randomness to prevent predictable patterns
  randomization_seconds: 30

logging:
  # Logging level: DEBUG, INFO, WARNING, or ERROR
  level: "DEBUG"
  
  # Path to the debug log file
  file: "./logs/debug.log"
